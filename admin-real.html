<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — Resultados</title><style>body{margin:0;padding:28px;background:#0e192c;color:#f8fafc;font-family:Arial}main{max-width:1200px;margin:auto;background:#172640;border:1px solid #2b3e5c;border-radius:18px;padding:24px}h1{margin:0 0 8px}p{color:#a9b7c6}select,input{height:42px;border:0;border-radius:9px;padding:0 10px}.game{display:grid;grid-template-columns:1fr 50px 18px 50px 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:12px 0;border-bottom:1px solid #2b3e5c}.save{border:0;border-radius:9px;padding:12px;background:#126235;color:#b9f0ca;font-weight:bold}@media(max-width:780px){.game{grid-template-columns:1fr 48px 18px 48px 1fr}.game select:nth-of-type(3),.game input,.save{grid-column:1/-1}}</style></head><body><main><h1>Resultados</h1><p>Selecione a rodada e registre o gabarito oficial de cada jogo.</p><section id="results"><h2>Rodada</h2><div id="result-list">Entre como Admin pelo acesso principal.</div></section></main><script type="module" src="admin-firestore.js"></script></body></html>
